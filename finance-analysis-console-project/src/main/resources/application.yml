spring:
  application:
    name: finance-ai

  # --- H2 내장 DB (Phase 0 전용, Phase 1에서 PostgreSQL로 교체) ---
  datasource:
    url: jdbc:h2:mem:financeai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true          # http://localhost:8080/h2-console 에서 DB 확인 가능
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop  # 서버 시작 시 테이블 자동 생성 (개발용)
    show-sql: true            # 실행되는 SQL을 콘솔에 출력
    properties:
      hibernate:
        format_sql: true      # SQL 출력을 보기 좋게 포맷

  # --- Flyway (Phase 1에서 활성화, 지금은 비활성화) ---
  flyway:
    enabled: false

  # --- 정적 파일 캐시 비활성화 (프론트 개발 편의) ---
  web:
    resources:
      cache:
        cachecontrol:
          no-store: true

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

server:
  port: 8080

# --- Swagger / OpenAPI ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html    # http://localhost:8080/swagger-ui.html
  api-docs:
    path: /v3/api-docs
