<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Analysis Console</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <h2>Finance Analysis Console</h2>

    <div id="app"></div>
  </div>

  <div id="popup-overlay" class="popup-overlay hidden">
    <div class="popup-box">
      <div class="popup-header">
        <span id="popup-title">Detail</span>
        <button id="popup-close" type="button">Close</button>
      </div>
      <pre id="popup-content" class="popup-content"></pre>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
